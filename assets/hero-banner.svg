<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0A0E27"/>
<stop offset="55%" stop-color="#0D1030"/>
<stop offset="100%" stop-color="#050714"/>
</linearGradient>
<radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#4DA8FF" stop-opacity="0.28"/>
<stop offset="100%" stop-color="#4DA8FF" stop-opacity="0"/>
</radialGradient>
<radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#9B7CFF" stop-opacity="0.22"/>
