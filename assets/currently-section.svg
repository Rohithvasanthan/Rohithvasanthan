<text x="200" y="130" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700" fill="#B9D6FF">Building</text>
<text x="200" y="150" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#7A8AAE">Real world products</text>
<text x="200" y="166" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#7A8AAE">AI-first full-stack apps</text>
</g>

<g>
