<svg width="1200" height="130" viewBox="0 0 1200 130" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="chipTop" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#152449"/>
<stop offset="100%" stop-color="#0D1730"/>
</linearGradient>
<filter id="soft"><feGaussianBlur stdDeviation="3"/></filter>
</defs>
<rect width="1200" height="130" fill="#050714"/>

<g>
