name: Render 3D Hero Banner

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "hero3d/**"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./hero3d
        run: npm install

      - name: Render 3D scene to GIF
        working-directory: ./hero3d
        run: node render.js

      - name: Commit generated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p assets
          cp hero3d/dist/hero-banner-3d.gif assets/hero-banner-3d.gif
          git add assets/hero-banner-3d.gif
          git diff --staged --quiet || git commit -m "Update animated 3D hero banner"
          git pull --rebase origin main
          git push
