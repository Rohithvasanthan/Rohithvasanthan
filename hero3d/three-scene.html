<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
html,body{margin:0;background:#050714;overflow:hidden;}
canvas{display:block;position:absolute;top:0;left:0;z-index:1;}
#overlay{
  position:absolute;
  left:660px;
  top:0;
  width:500px;
  height:340px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  font-family:Consolas,Monaco,monospace;
  pointer-events:none;
  z-index:2;
}
#overlay .prompt{color:#4DA8FF;font-size:15px;margin-bottom:6px;}
#overlay .name{
  font-size:42px;
  font-weight:700;
  background:linear-gradient(90deg,#4DA8FF,#B9D6FF,#4DA8FF);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  margin:0 0 8px 0;
}
#overlay .role{color:#8CB4FF;font-size:17px;margin:0;}
#overlay .cursor{
  display:inline-block;
  width:9px;height:16px;
  background:#4DA8FF;
  margin-left:6px;
  vertical-align:middle;
}
</style>
</head>
<body>
<div id="overlay">
  <div class="prompt">&gt; whoami</div>
  <div class="name">Rohith Vasanthan</div>
  <div class="role">AI + Full Stack Developer<span class="cursor" id="cursor"></span></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.sceneReady = false;

const WIDTH = 1200, HEIGHT = 340;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050714);
scene.fog = new THREE.FogExp2(0x050714, 0.045);

const camera = new THREE.PerspectiveCamera(48, WIDTH/HEIGHT, 0.1, 1000);
camera.position.set(0, 0, 11);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(WIDTH, HEIGHT);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x1a2244, 1.4));
const pLight = new THREE.PointLight(0x4DA8FF, 3, 60);
pLight.position.set(4, 3, 8);
scene.add(pLight);
const pLight2 = new THREE.PointLight(0x8CB4FF, 1.8, 60);
pLight2.position.set(-5, -2, 5);
scene.add(pLight2);

// ---------- Starfield ----------
const starGeo = new THREE.BufferGeometry();
const starCount = 260;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5) * 40;
  starPos[i*3+1] = (Math.random()-0.5) * 20;
  starPos[i*3+2] = (Math.random()-0.5) * 30 - 5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x8CB4FF, size: 0.06, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ---------- Glow sprite texture (for node halos) ----------
function makeGlowTexture() {
  const size = 128;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad.addColorStop(0, 'rgba(140,180,255,0.9)');
  grad.addColorStop(0.4, 'rgba(77,168,255,0.35)');
  grad.addColorStop(1, 'rgba(77,168,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(cnv);
}
const glowTex = makeGlowTexture();

// ---------- Neural network structure ----------
const netGroup = new THREE.Group();
netGroup.position.x = -3.6;
scene.add(netGroup);

const layerSizes = [4, 6, 6, 3];
const layerSpacingX = 2.2;
const nodes = []; // nodes[layerIndex] = [ {mesh}, ... ]
const nodeGeo = new THREE.SphereGeometry(0.09, 12, 12);
const nodeMat = new THREE.MeshBasicMaterial({ color: 0x9CC7FF });

layerSizes.forEach((count, li) => {
  const layerNodes = [];
  const x = (li - (layerSizes.length - 1) / 2) * layerSpacingX;
  for (let i = 0; i < count; i++) {
    const y = (i - (count - 1) / 2) * 0.75;
    const z = (Math.random() - 0.5) * 0.6;
    const mesh = new THREE.Mesh(nodeGeo, nodeMat);
    mesh.position.set(x, y, z);
    netGroup.add(mesh);

    const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
    halo.scale.set(0.55, 0.55, 1);
    halo.position.copy(mesh.position);
    netGroup.add(halo);

    layerNodes.push(mesh);
  }
  nodes.push(layerNodes);
});

// Connections between adjacent layers
const lineMat = new THREE.LineBasicMaterial({ color: 0x2A5FA8, transparent: true, opacity: 0.28 });
const connections = []; // { a, b } world positions (local to netGroup)
for (let li = 0; li < nodes.length - 1; li++) {
  nodes[li].forEach(a => {
    nodes[li+1].forEach(b => {
      const geo = new THREE.BufferGeometry().setFromPoints([a.position, b.position]);
      const line = new THREE.Line(geo, lineMat);
      netGroup.add(line);
      connections.push({ a: a.position, b: b.position });
    });
  });
}

// Traveling signal pulses along a handful of random connections
const pulseCount = 8;
const pulses = [];
const pulseGeo = new THREE.SphereGeometry(0.055, 8, 8);
const pulseMat = new THREE.MeshBasicMaterial({ color: 0x4DA8FF });
for (let i = 0; i < pulseCount; i++) {
  const conn = connections[Math.floor(Math.random() * connections.length)];
  const mesh = new THREE.Mesh(pulseGeo, pulseMat);
  netGroup.add(mesh);
  pulses.push({ mesh, conn, offset: Math.random() });
}

window.setFrame = function (t) {
  const angle = t * Math.PI * 2;

  netGroup.rotation.y = Math.sin(angle) * 0.35 + 0.15;
  netGroup.rotation.x = Math.sin(angle * 0.7) * 0.12;

  stars.rotation.y = -angle * 0.05;

  pulses.forEach(p => {
    const localT = (t + p.offset) % 1;
    p.mesh.position.lerpVectors(p.conn.a, p.conn.b, localT);
    const pulseOpacity = Math.sin(localT * Math.PI);
    p.mesh.material.opacity = 0.3 + pulseOpacity * 0.7;
    p.mesh.material.transparent = true;
  });

  renderer.render(scene, camera);
};

window.setFrame(0);
window.sceneReady = true;
</script>
</body>
</html>
