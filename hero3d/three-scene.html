<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>html,body{margin:0;background:#0A0E27;overflow:hidden;}canvas{display:block;}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.sceneReady = false;

const width = 1200, height = 340;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0A0E27);

const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
camera.position.set(0, 0, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(width, height);
document.body.appendChild(renderer.domElement);

// Ambient + point light for depth
scene.add(new THREE.AmbientLight(0x223355, 1.2));
const pLight = new THREE.PointLight(0x4DA8FF, 2.2, 50);
pLight.position.set(5, 4, 6);
scene.add(pLight);
const pLight2 = new THREE.PointLight(0x8CB4FF, 1.4, 50);
pLight2.position.set(-6, -3, 4);
scene.add(pLight2);

// Central glowing icosahedron (wireframe over solid low-opacity core)
const coreGeo = new THREE.IcosahedronGeometry(2.1, 1);
const coreMat = new THREE.MeshPhongMaterial({ color: 0x102048, shininess: 80, transparent: true, opacity: 0.85 });
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

const wireGeo = new THREE.IcosahedronGeometry(2.15, 1);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x4DA8FF, wireframe: true });
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// Orbiting particles (rings of small glowing spheres at different radii/speeds)
function makeOrbit(radius, count, color, size) {
  const group = new THREE.Group();
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const geo = new THREE.SphereGeometry(size, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color });
    const m = new THREE.Mesh(geo, mat);
    m.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius * 0.35, Math.sin(angle) * radius);
    group.add(m);
  }
  return group;
}
const orbit1 = makeOrbit(4.2, 10, 0x4DA8FF, 0.07);
const orbit2 = makeOrbit(5.4, 14, 0x8CB4FF, 0.05);
orbit2.rotation.x = 0.4;
scene.add(orbit1, orbit2);

window.setFrame = function (t) {
  // t goes 0 -> 1 across the loop
  const angle = t * Math.PI * 2;
  core.rotation.y = angle;
  core.rotation.x = angle * 0.4;
  wire.rotation.y = angle;
  wire.rotation.x = angle * 0.4;
  orbit1.rotation.y = angle * 1.3;
  orbit2.rotation.y = -angle * 0.9;
  renderer.render(scene, camera);
};

window.setFrame(0);
window.sceneReady = true;
</script>
</body>
</html>
